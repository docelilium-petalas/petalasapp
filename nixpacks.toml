[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
addedPkgs = ["openssl"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma migrate deploy && node_modules/.bin/next start -H 0.0.0.0"

[environment]
NODE_ENV = "production"
PORT = "3000"
NEXT_TELEMETRY_DISABLED = "1"
